server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/factor_factory?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: root
    password: passw0rd
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

jwt:
  secret: FactorFactory2026SecretKeyForJWTTokenGenerationMustBeLongEnough
  expiration: 86400000

staging:
  root-dir: ${user.dir}/../staging
  config-template-dir: ${user.dir}/../runtime/config

llm:
  default-providers:
    - name: OpenAI
      base-url: https://api.openai.com/v1
      description: GPT-4o / GPT-4o-mini 等
    - name: DeepSeek
      base-url: https://api.deepseek.com/v1
      description: DeepSeek-Chat / DeepSeek-Reasoner
    - name: 通义千问
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      description: Qwen-Max / Qwen-Plus 等
    - name: 智谱AI
      base-url: https://open.bigmodel.cn/api/paas/v4
      description: GLM-4 / GLM-4-Flash 等
    - name: Moonshot
      base-url: https://api.moonshot.cn/v1
      description: Moonshot-v1 系列

execution:
  max-concurrent-tasks: 4
  python-executable: python
  src-dir: ${user.dir}/../runtime/src

logging:
  level:
    com.factorfactory.webapp: DEBUG
