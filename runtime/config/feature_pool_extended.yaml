base_features:
  - name: ret_10d                 # 10日收益率，衡量两周级别短期趋势
    expr: close.pct_change(10)
  - name: intraday_range_mean_5d  # 5日平均振幅，衡量短期日内波动强度
    expr: high_low_range.rolling(5).mean()
  - name: intraday_range_mean_20d # 20日平均振幅，衡量月度日内波动强度
    expr: high_low_range.rolling(20).mean()
  - name: price_pos_10d           # 10日价格位置，衡量当前价在近10日区间中的相对高度
    expr: (close - close.rolling(10).min()) / (close.rolling(10).max() - close.rolling(10).min())
  - name: price_pos_60d           # 60日价格位置，衡量当前价在近60日区间中的相对高度
    expr: (close - close.rolling(60).min()) / (close.rolling(60).max() - close.rolling(60).min())
  - name: max_drawdown_10d        # 10日最大回撤，衡量短期回撤压力
    expr: close / close.rolling(10).max() - 1
  - name: max_drawdown_60d        # 60日最大回撤，衡量中期回撤压力
    expr: close / close.rolling(60).max() - 1
  - name: rebound_20d             # 20日反弹幅度，衡量是否脱离近期低点
    expr: close / close.rolling(20).min().shift(1) - 1
  - name: realized_vol_5d         # 5日实现波动率，衡量短期收益离散程度
    expr: close.pct_change().rolling(5).std()
  - name: realized_vol_60d        # 60日实现波动率，衡量中期收益离散程度
    expr: close.pct_change().rolling(60).std()
  - name: volume_mean_5d          # 5日平均成交量，衡量短期平均活跃度
    expr: volume.rolling(5).mean()
  - name: volume_mean_60d         # 60日平均成交量，衡量中期平均活跃度
    expr: volume.rolling(60).mean()
  - name: volume_ratio_5d         # 当日量比5日均量，衡量是否突然放量
    expr: volume / volume_mean_5d
  - name: amount_mean_5d          # 5日平均成交额，衡量短期资金参与的平均强度
    expr: amount.rolling(5).mean()
  - name: amount_vol_20d          # 成交额波动率，衡量资金参与是否稳定
    expr: amount.pct_change().rolling(20).std()
  - name: high_to_vwap            # 最高价相对成交均价偏离，衡量盘中上冲是否显著高于全天成交重心
    expr: high / vwap - 1
  - name: low_to_vwap             # 最低价相对成交均价偏离，衡量盘中下探是否显著低于全天成交重心
    expr: low / vwap - 1
  - name: vwap_ret_5d             # 成交均价5日变化率，衡量一周内全天成交重心的短期趋势
    expr: vwap.pct_change(5)
  - name: close_to_vwap_mean_5d   # 5日平均收盘相对成交均价偏离，衡量尾盘强弱是否持续
    expr: close_to_vwap.rolling(5).mean()
  - name: turnover_mean_5d        # 5日平均换手率，衡量短期筹码交换强度
    expr: turnover.rolling(5).mean()
  - name: turnover_vol_20d        # 换手率波动率，衡量交易热度是否忽高忽低
    expr: turnover.pct_change().rolling(20).std()
