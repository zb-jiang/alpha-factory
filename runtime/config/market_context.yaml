# ==============================================================================
# 市场上下文配置（market_context.yaml）
# 作用：驱动 step03b_market_context.py 生成 runtime/outputs/health/market_context.json
# 原则：仅放“市场状态计算与离散化”的参数，不放训练/回测主流程参数
# ==============================================================================

# ------------------------------------------------------------------------------
# 一、窗口参数（windows）
# 控制“怎么算”市场状态（滚动窗口长度、预热长度等）
# ------------------------------------------------------------------------------
windows:
  # 趋势窗口（交易日）
  # 用法：market_return 的 rolling sum，衡量市场是上行/下行/震荡
  # 调大：更平滑、反应更慢；调小：更敏感、噪声更高
  trend_days: 20

  # 波动率窗口（交易日）
  # 用法：market_return 的 rolling std，衡量市场波动状态
  # 常用：20（约1个月）、60（约1季度）
  volatility_days: 20

  # 离散度窗口（交易日）
  # 用法：cross_dispersion 的 rolling mean，衡量个股分化强弱
  # 说明：离散度高通常更利于选股 Alpha 发挥
  dispersion_days: 20

  # 历史分位窗口（交易日）
  # 用法：对成交额、换手、波动等状态做历史分位（0~1）
  # 建议：250（约1年）作为稳健基准
  rank_lookback_days: 250

  # 市值风格计算的最小样本数
  # 用法：按日按市值中位数切“大盘/小盘”后，样本不足则跳过
  # 目的：避免成分股太少导致风格差值失真
  min_size_style_sample: 20

  # 滚动统计最小有效期（交易日）
  # 用法：rolling(..., min_periods=...)，不足该长度时结果为 NaN
  # 调大：早期更稳健但可用数据更少；调小：更早出值但稳定性下降
  min_rolling_periods: 10

  # 分位计算最小有效期（交易日）
  # 用法：rank 分位 rolling 的 min_periods
  # 建议：至少 >= 20，避免分位值抖动过大
  min_rank_periods: 50

  # 预热加载长度（交易日）
  # 用法：加载 train_start 之前的历史数据，供长窗口滚动计算
  # 原则：应 >= rank_lookback_days，避免初期分位状态大量缺失
  warmup_trading_days: 260

# ------------------------------------------------------------------------------
# 二、离散化阈值（thresholds）
# 控制“怎么把连续数值翻译成文本标签”（高/中/低、上行/下行等）
# ------------------------------------------------------------------------------
thresholds:
  # 趋势上行阈值（20日累计收益）
  # >= trend_up 判定为“上行”
  trend_up: 0.03

  # 趋势下行阈值（20日累计收益）
  # <= trend_down 判定为“下行”
  trend_down: -0.03

  # 分位高阈值
  # >= rank_high 判定“高”，用于波动/流动性/离散度等等级标签
  rank_high: 0.67

  # 分位低阈值
  # <= rank_low 判定“低”，介于两者之间判定“中”
  rank_low: 0.33

  # 广度风险偏好阈值（上涨家数占比）
  # >= breadth_risk_on 判定“普涨”（风险偏好较强）
  breadth_risk_on: 0.62

  # 广度风险厌恶阈值（上涨家数占比）
  # <= breadth_risk_off 判定“普跌”（风险厌恶较强）
  breadth_risk_off: 0.38

# ------------------------------------------------------------------------------
# 三、字段映射（fields）
# 作用：将“市场状态计算所需字段名”映射到 raw_frame 实际列名
# 如果后续底层字段改名，只需改这里，不用改 step03b 代码
# ------------------------------------------------------------------------------
fields:
  # 收盘价字段（用于计算 ret_1d）
  close: close

  # 换手率字段（用于成交活跃度刻画）
  turnover: turnover

  # 成交额字段（用于资金参与强度与分位）
  amount: amount

  # 市值字段（用于大盘/小盘风格差）
  market_cap: market_cap
