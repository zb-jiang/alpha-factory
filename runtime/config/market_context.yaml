# ==============================================================================
# 市场环境配置（market_context.yaml）
# ------------------------------------------------------------------------------
# 这个文件是给 step03_market_context.py 用的。
# 它的任务可以理解成两步：
# 1. 先告诉程序：市场环境要从哪几个角度看
# 2. 再告诉程序：每个角度算出来以后，什么情况叫“强/弱”“高/低”“上行/下行”
#
# 当前这套市场环境，大致是从下面 9 个角度看市场：
# 1. 趋势：市场整体最近是往上走、往下走，还是横着走
# 2. 波动：市场最近起伏大不大，稳不稳
# 3. 流动性：市场最近成交活不活跃，钱多不多
# 4. 分化：股票之间差异大不大，是不是有人大涨有人大跌
# 5. 广度：上涨股票多不多，是普涨、普跌，还是分化
# 6. 风格：大盘更强，还是小盘更强
# 7. 北向资金：外资最近整体是在流入还是流出
# 8. 两融情绪：杠杆资金最近是在升温还是降温
# 9. 资金结构：北向资金和两融情绪是同向进攻、同向防守，还是方向背离
#
# 为了让这些词更容易理解，下面用更白话的方式再解释一遍：
# 1. 趋势
#    你可以把它理解成“市场整体最近是在往哪边走”。
#    如果大多数股票平均下来这段时间一直偏涨，就是上行趋势；
#    如果平均下来一直偏跌，就是下行趋势；
#    如果涨一点跌一点，来回拉扯，就更像震荡。
#
# 2. 波动
#    你可以把它理解成“市场最近稳不稳”。
#    如果每天涨跌都不大，市场比较平稳，波动就低；
#    如果今天大涨、明天大跌，像坐过山车，波动就高。
#
# 3. 流动性
#    你可以把它理解成“市场里交易热不热闹、钱多不多”。
#    成交额大，说明大家买卖更活跃，资金参与更强；
#    成交额小，说明市场比较冷清。
#
# 4. 分化
#    你可以把它理解成“同一个市场里，股票表现差得大不大”。
#    如果大家涨跌都差不多，分化就小；
#    如果有的股票大涨、有的股票大跌，差别很大，分化就大。
#    分化大的市场里，更容易出现“选对股和选错股差很多”的情况。
#
# 5. 广度
#    你可以把它理解成“市场上涨是不是很全面”。
#    如果很多股票一起涨，这是广度强，常常叫普涨；
#    如果很多股票一起跌，这是广度弱，常常叫普跌；
#    如果只是少数股票在涨，其他股票不怎么动甚至在跌，那就说明市场并不是全面走强。
#
# 6. 风格
#    你可以把它理解成“这段时间市场更偏爱哪一类股票”。
#    这里当前主要看的是：大市值股票更强，还是小市值股票更强。
#    如果大盘股整体更强，就叫大盘占优；反过来就是小盘占优。
#
# 7. 北向资金
#    你可以把它理解成“外资最近是在加仓 A 股，还是在减仓 A 股”。
#    如果最近几天北向资金持续净流入，通常说明外资态度偏积极；
#    如果持续净流出，通常说明外资更谨慎。
#
# 8. 两融情绪
#    你可以把它理解成"使用杠杆的资金最近胆子大不大"。
#    如果融资买入更积极、融资余额也偏高，往往说明杠杆情绪在升温；
#    如果融资净流变弱、融资余额走低，往往说明杠杆情绪在降温。
#
# 9. 资金结构
#    你可以把它理解成"外资和杠杆资金是不是在往同一个方向使劲"。
#    如果北向在流入、两融也在升温，说明内外资都在进攻，叫"同向进攻"；
#    如果北向在流出、两融也在降温，说明内外资都在撤退，叫"同向防守"；
#    如果两者方向相反（比如外资在买但杠杆在降），说明资金面有分歧，
#    这时候市场往往不太稳定，需要更谨慎。
#
# 这 9 个角度不是直接拍脑袋下结论，而是先算出一些"连续数值"，再用 thresholds
# 里的门槛把它们翻译成“上行 / 中性 / 下行”“高 / 中 / 低”“偏流入 / 偏流出”这种
# 人能直接读懂的标签。
#
# 这里只放“市场环境怎么计算”的参数，不放训练、回测主流程参数。
# ==============================================================================

# ------------------------------------------------------------------------------
# 一、窗口参数（windows）
# ------------------------------------------------------------------------------
# 你可以把“窗口”理解成：程序往前回头看多少个交易日，再来判断“现在市场是什么状态”。
#
# 简单理解：
# - 窗口大：像看更长时间的平均成绩，结果更稳，但反应更慢
# - 窗口小：像更看重最近几次考试，反应更快，但更容易受短期波动影响
#
# 下面每个参数后面，我都会写清楚它对应的是上面 8 个角度里的哪一个。
# ------------------------------------------------------------------------------
windows:
  # 对应角度：1. 趋势
  # 这个值决定程序看“最近多少个交易日”的市场整体平均涨跌。
  # 代码里先按每天算出股票池的平均日涨跌幅 market_return，
  # 再把最近 trend_days 天的 market_return 加总，得到 trend_20d。
  # 如果你填 20，大致就是看最近 1 个月的市场整体累计表现。
  # 注意：这里不是看某一只股票涨了多少，而是看股票池整体的平均表现。
  trend_days: 20

  # 对应角度：2. 波动
  # 代码里先算 market_return（市场整体平均日涨跌），
  # 再看最近 volatility_days 天这些日涨跌幅有多“忽上忽下”。
  # 用更直白的话说：最近这段时间市场是很稳，还是像坐过山车。
  volatility_days: 20

  # 对应角度：4. 分化
  # 代码里每天先算所有股票当天收益率的标准差 cross_dispersion，
  # 再对最近 dispersion_days 天取滚动平均，得到 dispersion_20d。
  # 如果这个值高，说明同一天里股票之间差别很大，市场更分化。
  dispersion_days: 20

  # 对应角度：2. 波动、3. 流动性、4. 分化
  # 这个值不是直接算某个指标本身，而是用来做“历史比较”。
  # 例如：
  # - 今天的波动，放到过去 250 天里算高不高
  # - 今天的成交额，放到过去 250 天里算高不高
  # - 今天的分化，放到过去 250 天里算高不高
  # 代码里会把这些指标换成 0~1 的历史分位：
  # - 越接近 1，说明和过去比偏高
  # - 越接近 0，说明和过去比偏低
  rank_lookback_days: 250

  # 对应角度：7. 北向资金
  # 代码里会先取每天北向净流入 north_money，
  # 再把最近 northbound_days 天的 north_money 加总，
  # 得到 northbound_flow_window。
  # 这个值越大，说明最近几天北向更偏连续流入；
  # 这个值越小，说明最近几天北向更偏连续流出。
  northbound_days: 5

  # 对应角度：8. 两融情绪
  # 代码里先算每天融资净流：
  # margin_net_flow = 融资买入额 rzmre - 融资偿还额 rzche
  # 再把最近 margin_days 天的融资净流加总，
  # 得到 margin_flow_window。
  # 这个值越大，通常说明最近杠杆资金更积极。
  margin_days: 5

  # 对应角度：7. 北向资金、8. 两融情绪
  # 这个值和上面的 rank_lookback_days 很像，只不过它专门给资金面用。
  # 代码里会把：
  # - northbound_flow_window
  # - margin_flow_window
  # - 融资余额 rzye
  # 这些指标拿去和过去 flow_rank_lookback_days 天比较，算成历史分位。
  # 这样程序就能判断“现在的外资/杠杆资金，和过去比是偏强还是偏弱”。
  flow_rank_lookback_days: 250

  # 对应角度：6. 风格
  # 程序每天会按市值中位数把股票分成“大盘”和“小盘”两组，
  # 再比较这两组谁当天平均涨得更好。
  # 但如果当天可用股票太少，这个比较就不稳了。
  # 所以这里规定：少于这么多只股票时，今天就不做大小盘判断。
  min_size_style_sample: 20

  # 对应角度：1. 趋势、2. 波动、4. 分化、7. 北向资金、8. 两融情绪
  # 这个值是“最少要攒够多少天历史”，程序才开始算滚动指标。
  # 比如你窗口设成 20，但 min_rolling_periods 设成 10，
  # 那么至少要先有 10 天数据，程序才开始给出结果。
  # 这样做是为了避免一开始数据太少，算出来的值乱跳。
  min_rolling_periods: 10

  # 对应角度：2. 波动、3. 流动性、4. 分化、7. 北向资金、8. 两融情绪
  # 这个值是“最少要攒够多少天历史”，程序才开始做分位比较。
  # 所谓分位比较，你可以理解成：
  # “把今天这个数，放到过去很多天里排个名，看它大概处在前 30%、中间还是后 30%。”
  # 如果历史样本太少，这个排位就不可靠，所以这里要设一个最小门槛。
  min_rank_periods: 50

  # 对应所有角度的“准备阶段”
  # 这个值不是某个市场角度本身，而是给前面那些滚动窗口和分位窗口做准备。
  # 因为如果你一上来就从训练起点开始读数据，
  # 那么“过去 20 天趋势”“过去 250 天历史分位”在最开始都算不出来。
  # 所以程序会先往前多读一段历史，当作预热。
  warmup_trading_days: 260

# ------------------------------------------------------------------------------
# 二、标签阈值（thresholds）
# ------------------------------------------------------------------------------
# 这一部分回答的是：“连续数值算出来以后，什么程度才算高、什么程度才算低？”
#
# 这里特别容易混淆两件事：
# 1. windows：决定“怎么算指标”
# 2. thresholds：决定“算出来以后怎么贴标签”
#
# 举例：
# - windows.trend_days = 20 是说：趋势先看最近 20 天
# - thresholds.trend_up = 0.03 是说：如果最近 20 天累计涨幅 >= 3%，就叫“上行”
#
# 所以 thresholds 不是重新算一个新指标，而是给前面算好的指标划分档位。
# ------------------------------------------------------------------------------
thresholds:
  # 对应角度：1. 趋势
  # 对应指标：trend_20d
  # trend_20d 的计算方式：
  # 1. 先每天算股票池整体平均涨跌幅 market_return
  # 2. 再把最近 trend_days 天的 market_return 加起来
  # 3. 最后在整个训练窗口里取平均，得到 trend_20d_mean
  # 如果 trend_20d_mean >= trend_up，就把趋势标签记成“上行”。
  # 这里的 0.03 就是 3%，表示“最近一段时间市场整体平均累计涨幅至少到 3%”。
  trend_up: 0.03

  # 对应角度：1. 趋势
  # 对应指标：trend_20d
  # 如果 trend_20d_mean <= trend_down，就把趋势标签记成“下行”。
  # 如果夹在 trend_down 和 trend_up 中间，就记成“震荡/中性”。
  # 这里的 -0.03 就是 -3%，表示最近一段时间市场整体平均累计跌幅达到 3% 左右。
  trend_down: -0.03

  # 对应角度：2. 波动、3. 流动性、4. 分化
  # 对应指标：
  # - vol_rank_250d
  # - amount_rank_250d
  # - dispersion_rank_250d
  #
  # 这些指标本身不是原始数值，而是“历史分位”，取值大致在 0~1。
  # 例如 0.67 可以理解成：和过去一大段时间比，现在这个值大约已经超过 67% 的历史样本了。
  # 所以当某个分位 >= rank_high，就记成“高”。
  rank_high: 0.67

  # 对应角度：2. 波动、3. 流动性、4. 分化
  # 对应指标还是上面那几个历史分位指标。
  # 如果分位 <= 0.33，就记成“低”；
  # 如果在 0.33 和 0.67 之间，就记成“中”。
  # 所以 rank_high 和 rank_low 是成对出现的，负责把分位切成“高 / 中 / 低”三档。
  rank_low: 0.33

  # 对应角度：5. 广度
  # 对应指标：breadth_up_ratio
  # 这个指标的计算方式是：
  # - 每天看股票池里有多少股票当天是上涨的
  # - 用“上涨股票数 / 全部股票数”得到上涨占比
  # - 再在整个窗口里取平均，得到 breadth_up_ratio_mean
  # 如果 breadth_up_ratio_mean >= 这个值，就记成“普涨 / 风险偏好较强”。
  # 例如 0.62 表示：平均来看，大约 62% 以上的股票都在涨，市场就比较偏强。
  breadth_risk_on: 0.62

  # 对应角度：5. 广度
  # 对应指标：breadth_up_ratio
  # 如果 breadth_up_ratio_mean <= 这个值，就记成“普跌 / 风险偏好较弱”。
  # 如果介于 breadth_risk_off 和 breadth_risk_on 之间，
  # 就说明不是特别明显的普涨，也不是特别明显的普跌，更接近分化或中性。
  breadth_risk_off: 0.38

  # 对应角度：7. 北向资金
  # 对应指标：northbound_flow_rank
  # 计算方式：
  # 1. 每天取北向净流入 north_money
  # 2. 把最近 northbound_days 天加总，得到 northbound_flow_window
  # 3. 再把它放到过去 flow_rank_lookback_days 天里排位，得到 northbound_flow_rank
  # 4. 再在整个分析窗口内取平均，得到 northbound_flow_rank_mean
  # 如果 northbound_flow_rank_mean >= 这个值，就把北向标签记成“偏流入”。
  # 注意：这里比较的不是单日流入额，而是“最近几天累计流向在历史上算强不强”。
  northbound_inflow_high: 0.67

  # 对应角度：7. 北向资金
  # 对应指标：northbound_flow_rank
  # 如果 northbound_flow_rank_mean <= 这个值，就把北向标签记成“偏流出”。
  # 如果夹在 northbound_outflow_low 和 northbound_inflow_high 中间，
  # 就更接近“中性 / 一般”。
  northbound_outflow_low: 0.33

  # 对应角度：8. 两融情绪
  # 对应指标：
  # - margin_flow_rank：最近几天融资净流在历史上排位高不高
  # - margin_balance_rank：当前融资余额在历史上排位高不高
  #
  # 程序不是只看一个数，而是把“融资净流分位”和“融资余额分位”一起看。
  # 如果这两个指标整体都偏高，就会把两融情绪记成“升温”。
  # 所以这个门槛本质上是在判断：杠杆资金最近是不是明显更积极。
  leverage_hot_high: 0.67

  # 对应角度：8. 两融情绪
  # 对应指标还是 margin_flow_rank 和 margin_balance_rank 这两个。
  # 如果它们整体都偏低，就会把两融情绪记成“降温”。
  # 简单理解就是：最近杠杆资金没那么积极了，风险偏好更弱了。
  leverage_cold_low: 0.33

# ------------------------------------------------------------------------------
# 三、字段名对应关系（fields）
# ------------------------------------------------------------------------------
# 这里回答的是：上面那些市场角度需要用到的底层数据列，在原始数据里分别叫什么名字。
#
# 这一段不是阈值，也不是窗口，而是“列名翻译表”。
# 例如：
# - 市场趋势和波动，要先用到收盘价
# - 市场活跃度，要用到换手率和成交额
# - 大盘/小盘风格，要用到市值
#
# 如果以后底层字段改名，通常只改这里就够了，不用到代码里逐个改。
# ------------------------------------------------------------------------------
fields:
  # 对应角度：1. 趋势、2. 波动、4. 分化、5. 广度
  # 程序先按股票计算每天收益率 ret_1d，
  # 再从这些日收益率继续算市场平均收益、分化、上涨占比等指标。
  close: close

  # 对应角度：辅助观察活跃度
  # 程序会算 market_turnover 的历史分位，结果放进 stats 里，
  # 它更多是辅助信息，不是当前 summary_text 里最核心的标签来源。
  turnover: turnover

  # 对应角度：3. 流动性
  # 程序每天把股票池成交额加总成 market_amount，
  # 再和过去 rank_lookback_days 天比较，算出 amount_rank_250d。
  # 最后根据 rank_high / rank_low，把流动性记成“高 / 中 / 低”。
  amount: amount

  # 对应角度：6. 风格
  # 程序每天按市值中位数，把股票分成大盘和小盘两组，
  # 再比较这两组当天平均收益谁更高。
  # 如果大盘组平均更强，就更偏“大盘占优”；反之就是“小盘占优”。
  market_cap: market_cap
