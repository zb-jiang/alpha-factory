# ==============================================================================
# 股票池配置示例
# ==============================================================================
# 这些示例展示了如何配置不同类型的股票池
# 将其中一个配置复制到 analysis_rule.yaml 中使用

# ==============================================================================
# 示例 1: 沪深300成分股（推荐用于米筐验证）
# ==============================================================================
# 优点：
# - 与米筐平台完全一致，便于结果对比
# - 股票质量高，都是大盘蓝筹股
# - 标准指数，结果可解释性强
# 适用场景：
# - 米筐平台验证
# - 聚宽平台验证
# - 生产环境（如果偏好大盘股）
example_1_csi300:
  stock_pool:
    type: "index_components"
    index_code: "000300.XSHG"  # 沪深300

# ==============================================================================
# 示例 2: 中证500成分股
# ==============================================================================
# 优点：
# - 覆盖中盘成长股，代表性强
# - 与米筐、聚宽平台兼容
# 适用场景：
# - 因子挖掘（覆盖面比沪深300更广）
# - 米筐验证
example_2_csi500:
  stock_pool:
    type: "index_components"
    index_code: "000905.XSHG"  # 中证500

# ==============================================================================
# 示例 3: 行业股票池（特定行业研究）
# ==============================================================================
# 优点：
# - 聚焦特定行业，深入研究
# - 行业内因子有效性更高
# 注意：
# - 当前版本需要数据源支持行业分类
# - 返回空列表，待后续实现
# 适用场景：
# - 特定行业因子挖掘
# - 行业轮动策略研究
example_3_industry:
  stock_pool:
    type: "industry"
    industry_name: "银行"  # 行业名称
    industry_level: 1  # 行业级别（1=一级行业，2=二级行业）

# ==============================================================================
# 示例 4: 全市场股票池
# ==============================================================================
# 优点：
# - 覆盖最全面，包含所有A股
# - 适合全市场因子挖掘
# - 不受指数成分股限制
# 注意：
# - 股票数量多（4000+），计算时间长
# - 需要足够的计算资源
# 适用场景：
# - 全市场因子挖掘
# - 大规模回测
example_4_all_market:
  stock_pool:
    type: "all_market"

# ==============================================================================
# 示例 5: 随机抽样100只股票（快速验证）
# ==============================================================================
# 优点：
# - 计算快速，适合开发调试
# - 通过固定种子保证结果可复现
# - 比字母顺序更科学
# 适用场景：
# - 开发阶段快速验证
# - 系统功能测试
example_5_random_100:
  stock_pool:
    type: "random_sample"
    base_pool_type: "all_market"  # 从全市场抽样
    # 如需从指数成分股抽样，可改为:
    # base_pool_type: "index_components"  # 并同时配置 index_code，例如 "000300.XSHG"
    sample_size: 100  # 抽样100只
    seed: 42  # 固定随机种子，保证可复现

# ==============================================================================
# 示例 6: 分层抽样500只股票（因子挖掘）
# ==============================================================================
# 优点：
# - 保证样本代表性，覆盖不同市值
# - 比简单随机抽样更科学
# - 适合因子挖掘，避免样本偏差
# 适用场景：
# - 因子挖掘阶段
# - 需要代表性样本的研究
example_6_stratified_500:
  stock_pool:
    type: "stratified_sample"
    base_pool_type: "all_market"  # 从全市场分层，分三层
    sample_size: 500  # 抽样500只
    stratify_by: ["market_cap"]  # 按市值分层
    seed: 42  # 固定随机种子

# ==============================================================================
# 示例 7: 自定义股票列表（生产环境）
# ==============================================================================
# 优点：
# - 结果完全可控，便于对比和复现
# - 可以根据需要选择自己关注的股票
# - 适合实际交易场景
# 适用场景：
# - 生产环境
# - 特定股票池的研究
example_7_custom_list:
  stock_pool:
    type: "custom_list"
    instruments:
      - "000001.XSHE"  # 平安银行
      - "000002.XSHE"  # 万科A
      - "600000.XSHG"  # 浦发银行
      - "600036.XSHG"  # 招商银行
      - "601318.XSHG"  # 中国平安
      - "600519.XSHG"  # 贵州茅台
      - "000858.XSHE"  # 五粮液
      - "002415.XSHE"  # 海康威视
      - "300750.XSHE"  # 宁德时代
      - "688983.XSHG"  # 中芯国际

# ==============================================================================
# 示例 8: 从沪深300中随机抽样50只
# ==============================================================================
# 优点：
# - 结合了指数成分股的质量和抽样的灵活性
# - 样本量适中，计算效率高
# - 与米筐平台兼容（米筐也支持沪深300）
# 适用场景：
# - 快速验证
# - 计算资源有限的情况
example_8_csi300_random_50:
  stock_pool:
    type: "random_sample"
    base_pool_type: "index_components"  # 基于指数成分股
    sample_size: 50  # 抽样50只
    seed: 42
    index_code: "000300.XSHG"  # 沪深300

# ==============================================================================
# 推荐配置组合
# ==============================================================================

# 开发阶段（快速验证系统功能）
dev_config:
  stock_pool:
    type: "random_sample"
    base_pool_type: "all_market"
    sample_size: 100
    seed: 42
  run_mode: train
  train_start_date: "2018-01-01"
  train_end_date: "2020-12-31"

# 因子挖掘阶段（保证代表性 + 可在米筐验证）
# 注意：推荐使用沪深300或中证500，便于在米筐平台验证
# 如果使用分层抽样，需要导出股票列表到米筐（见方案2）
factor_mining_config:
  stock_pool:
    type: "index_components"
    index_code: "000905.XSHG"  # 中证500（覆盖面更广）
  run_mode: train
  train_start_date: "2018-01-01"
  train_end_date: "2020-12-31"

# 因子挖掘阶段 - 分层抽样版本（需要导出股票列表到米筐）
factor_mining_stratified_config:
  stock_pool:
    type: "stratified_sample"
    base_pool_type: "all_market"
    sample_size: 500
    stratified_by: ["market_cap"]
    seed: 42
  run_mode: train
  train_start_date: "2018-01-01"
  train_end_date: "2020-12-31"

# 米筐验证阶段（与米筐平台保持一致）
ricequant_validation_config:
  stock_pool:
    type: "index_components"
    index_code: "000300.XSHG"  # 沪深300
  run_mode: test
  test_start_date: "2021-01-01"
  test_end_date: "2022-12-31"

# 生产环境（稳定可控）
production_config:
  stock_pool:
    type: "index_components"
    index_code: "000300.XSHG"  # 沪深300
  run_mode: train
  train_start_date: "2018-01-01"
  train_end_date: "2022-12-31"

# ==============================================================================
# 使用说明
# ==============================================================================
# 1. 选择一个配置，例如 example_1_csi300
# 2. 将配置内容复制到 runtime/config/analysis_rule.yaml 中
# 3. 运行系统：python runtime/src/step10_iterate.py
# 4. 系统会自动使用配置的股票池进行因子挖掘
#
# 不同阶段可以使用不同的配置：
# - 开发阶段：使用 example_5_random_100（快速验证）
# - 因子挖掘：使用 factor_mining_config（中证500，可在米筐验证）
# - 因子挖掘（分层抽样）：使用 factor_mining_stratified_config（需导出股票列表）
# - 米筐验证：使用 example_1_csi300（保持一致）
# - 生产环境：使用 example_1_csi300 或 example_7_custom_list
# - 全市场：使用 example_4_all_market（全市场因子挖掘）
# - 行业研究：使用 example_3_industry（特定行业）
