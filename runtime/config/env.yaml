# ==============================================================================
# Tushare 基础环境与大模型外挂总控配置
# ==============================================================================

# 【1. 数据源配置】
# 当前仅支持 Tushare Pro
data_source: tushare

# Tushare 配置（当 data_source: tushare 时使用）
tushare:
  # Tushare API Key（建议通过环境变量设置，避免明文存储）
  # 获取方式：访问 https://tushare.pro/register 注册并获取 API Key
  api_key: cb50426457ff18c866780815253ad485c794c0bb1fe27be8595cfc02
  # 数据缓存目录（用于缓存 Tushare 数据，减少 API 调用）
  data_cache_dir: D:/test/factor-factory/runtime/data/tushare_cache
  enable_meta_reconcile: true

# 【2. 基础环境配置】
# 数据频率，'day' 表示日线数据
freq: day

# 【4. 大模型与迭代配置】
# 大模型接口配置。统一从本文件读取，不依赖系统环境变量
llm_model: MiniMax-M2.5
llm_base_url: https://ark.cn-beijing.volces.com/api/coding/v3
llm_api_key: 8b459530-665a-49d4-9573-9e06d82e076a
# 【迭代参数】每个训练窗口discovery阶段的循环迭代次数，3 表示大模型会看结果反馈后连着迭代 3 轮
iteration_count: 1
# 【迭代参数】告诉大模型，每一轮让它新生成多少个候选因子
llm_candidate_count: 20
# 单 Prompt 模式下 LLM 的 temperature（创意程度），默认 0.7
llm_temperature: 0.7

# ── 多 Agent 因子挖掘配置 ────────────────────────────────────────────────────
# 设为 true 时，step05 走多 Agent 流水线（分析师团队 → 首席分析师 → 生成器 → 评审员）
# 设为 false 时，保持原有单 Prompt 模式
enable_multi_agent: true

# 多 Agent 模式下，每个 Agent 可独立配置 LLM 参数（model / base_url / api_key 必填）
# 每个 Agent 还可以选填：temperature / timeout_seconds / max_retries
llm_agents:
  # ── 阶段 1: 专业分析师团队（5 个并行）───────────────────────────────────────
  trend_momentum:
    model: MiniMax-M2.5
    base_url: https://ark.cn-beijing.volces.com/api/coding/v3
    api_key: 8b459530-665a-49d4-9573-9e06d82e076a
    temperature: 0.6
    timeout_seconds: 60.0
    max_retries: 2
  reversal_mean_reversion:
    model: MiniMax-M2.5
    base_url: https://ark.cn-beijing.volces.com/api/coding/v3
    api_key: 8b459530-665a-49d4-9573-9e06d82e076a
    temperature: 0.6
    timeout_seconds: 60.0
    max_retries: 2
  volatility_risk:
    model: MiniMax-M2.5
    base_url: https://ark.cn-beijing.volces.com/api/coding/v3
    api_key: 8b459530-665a-49d4-9573-9e06d82e076a
    temperature: 0.6
    timeout_seconds: 60.0
    max_retries: 2
  volume_price:
    model: MiniMax-M2.5
    base_url: https://ark.cn-beijing.volces.com/api/coding/v3
    api_key: 8b459530-665a-49d4-9573-9e06d82e076a
    temperature: 0.6
    timeout_seconds: 60.0
    max_retries: 2
  microstructure:
    model: MiniMax-M2.5
    base_url: https://ark.cn-beijing.volces.com/api/coding/v3
    api_key: 8b459530-665a-49d4-9573-9e06d82e076a
    temperature: 0.6
    timeout_seconds: 60.0
    max_retries: 2
  # ── 阶段 2: 首席分析师（整合 5 个分析师的输出）─────────────────────────────
  chief_analyst:
    model: MiniMax-M2.5
    base_url: https://ark.cn-beijing.volces.com/api/coding/v3
    api_key: 8b459530-665a-49d4-9573-9e06d82e076a
    temperature: 0.2
    timeout_seconds: 90.0
    max_retries: 2
  # ── 阶段 3: 因子生成器（按设计方向生成因子公式）─────────────────────────────
  generator:
    model: MiniMax-M2.5
    base_url: https://ark.cn-beijing.volces.com/api/coding/v3
    api_key: 8b459530-665a-49d4-9573-9e06d82e076a
    temperature: 0.2
    timeout_seconds: 90.0
    max_retries: 2
  # ── 阶段 4: 因子评审员（PASS / REJECT 严格评审）─────────────────────────────
  reviewer:
    model: MiniMax-M2.5
    base_url: https://ark.cn-beijing.volces.com/api/coding/v3
    api_key: 8b459530-665a-49d4-9573-9e06d82e076a
    temperature: 0.2
    timeout_seconds: 60.0
    max_retries: 2

# 【5. 特征体检与摘要配置】
# 【摘要参数】生成健康检查摘要时，分别挑选几个“最强”和“最弱”的特征给大模型看
summary_top_k: 3
# 【摘要参数】生成健康检查摘要时，挑选几个“最不稳定”的特征给大模型看
unstable_top_k: 3
# 【摘要参数】判断两个特征是否“高度重合”的相关系数绝对值阈值（如 0.5 表示达到中等相关即提示大模型）
high_corr_threshold: 0.5
# 【摘要参数】特征缺失率阈值（如 0.2 表示缺失率超过 20% 的特征会被标记为 review 并提示给大模型）
max_missing_ratio: 0.2

# 【6. 因子预筛与回测配置】
# 回测参数：因子预筛的各项阈值
# 如果因子不满足以下全部条件，则跳过回测
min_rank_ic_to_backtest: 0.02      # Rank IC 绝对值阈值（行业通常 0.02-0.03 以上算有效，这里放宽）
min_rank_ic_ir_to_backtest: 0.2    # Rank IC IR 绝对值阈值（代表稳定性，行业通常 0.2 以上）
min_positive_ic_ratio: 0.4         # IC为正（或为负，视方向而定）的胜率阈值（要求胜率不偏离50%太多）
enable_direction_filter: false     # 是否额外要求 LLM 猜测方向与样本内经验方向一致，默认关闭
