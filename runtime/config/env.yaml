# ==============================================================================
# Qlib 基础环境与大模型外挂总控配置
# ==============================================================================

# 【1. 数据源配置】
# 数据源类型: qlib | ricequant | tushare
#   - qlib: 使用本地 Qlib 数据（免费，数据截止到 2022/12/31）
#   - ricequant: 使用米筐 RQData（需购买，数据实时更新到最新）
#   - tushare: 使用 Tushare Pro（免费/付费，数据较新，需要注册获取 API Key）
data_source: tushare

# Qlib 配置（当 data_source: qlib 时使用）
# Qlib 的数据存储目录（即第一步下载的历史数据存放位置）
provider_uri: D:/test/factor-factory/runtime/data/qlib_cn

# 米筐配置（当 data_source: ricequant 时使用）
ricequant:
  # 米筐账号（建议通过环境变量设置，避免明文存储密码）
  username: ${RICEQUANT_USERNAME}
  password: ${RICEQUANT_PASSWORD}
  # 数据缓存目录（用于缓存米筐数据，减少 API 调用）
  data_cache_dir: D:/test/factor-factory/runtime/data/ricequant_cache

# Tushare 配置（当 data_source: tushare 时使用）
tushare:
  # Tushare API Key（建议通过环境变量设置，避免明文存储）
  # 获取方式：访问 https://tushare.pro/register 注册并获取 API Key
  api_key: ${TUSHARE_API_KEY}
  # 数据缓存目录（用于缓存 Tushare 数据，减少 API 调用）
  data_cache_dir: D:/test/factor-factory/runtime/data/tushare_cache

# 【2. 基础环境配置】
# 项目运行根目录，所有相对路径（如果使用）通常以此为基准
project_root: D:/test/factor-factory/runtime
# 市场区域设置，cn 代表中国市场（A股），us 代表美股
region: cn
# 股票池范围。在 A 股数据集中，'all' 表示全市场，也可以设为 'csi300' 或 'csi500'
# market: all
# 数据频率，'day' 表示日线数据
freq: day
# 抽样打印数据时使用的股票代码
sample_instrument: SH600000
# 【核心参数】截取数量。
# 第一版为了让原型跑得快（做快速联调），设为 100（即只取前 100 只股票做体检和回测）。
# 如果你要跑全市场真实回测，请把它改成 0 
# max_instruments: 100

# 【股票池配置】
# 使用沪深300指数成分股作为股票池
stock_pool:
  type: index_components
  index_code: SH000300

# 【2. 时间与回测区间配置】
# 【样本内外隔离配置】
# run_mode 可选值: 
#   - 'train': 样本内训练模式。用于大模型迭代、因子特征体检、初筛回测。
#   - 'test':  样本外盲测模式。因子定型后，在这段大模型没见过的数据上验证真实有效性。
run_mode: test
# 样本内 (In-Sample) 时间段
train_start_date: 2018-01-01
train_end_date: 2020-12-31
# 样本外 (Out-of-Sample) 时间段
test_start_date: 2021-01-01
test_end_date: 2022-12-31

# 【3. 预测目标配置】
# 模型预测的目标标签（即我们希望因子去拟合什么）
# 注意：此项仅作为列名提供给大模型参考，真实计算逻辑由 label_horizon 决定。
# 修改此项时，务必同步修改 label_horizon 保持一致（例如：future_10d_return 对应 label_horizon: 10）
target_label: future_5d_return
# 收益率窗口，5 表示真实计算未来 5 个交易日的收益率作为标签。
# 修改此项会直接改变底层数据的计算逻辑。若修改，建议同步调整回测代码中的调仓频率（如 weekly_rebalance_dates）。
label_horizon: 5

# 【4. 大模型与迭代配置】
# 大模型接口配置。这里引用了系统环境变量，你需要在终端 setx 提前设置好
llm_model: ${OPENAI_MODEL}
llm_base_url: ${OPENAI_BASE_URL}
# 【迭代参数】自动化工作流的循环迭代次数，3 表示大模型会看结果反馈后连着迭代 3 轮
iteration_count: 3
# 【迭代参数】告诉大模型，每一轮让它新生成多少个候选因子
llm_candidate_count: 10

# 【5. 特征体检与摘要配置】
# 【摘要参数】生成健康检查摘要时，分别挑选几个“最强”和“最弱”的特征给大模型看
summary_top_k: 3
# 【摘要参数】生成健康检查摘要时，挑选几个“最不稳定”的特征给大模型看
unstable_top_k: 3
# 【摘要参数】判断两个特征是否“高度重合”的相关系数绝对值阈值（如 0.5 表示达到中等相关即提示大模型）
high_corr_threshold: 0.5
# 【摘要参数】特征缺失率阈值（如 0.2 表示缺失率超过 20% 的特征会被标记为 review 并提示给大模型）
max_missing_ratio: 0.2

# 【6. 因子预筛与回测配置】
# 回测参数：因子预筛的各项阈值
# 如果因子不满足以下全部条件，则跳过回测
min_rank_ic_to_backtest: 0.01      # Rank IC 绝对值阈值（行业通常 0.02-0.03 以上算有效，这里放宽）
min_rank_ic_ir_to_backtest: 0.1    # Rank IC IR 绝对值阈值（代表稳定性，行业通常 0.2 以上）
min_positive_ic_ratio: 0.4         # IC为正（或为负，视方向而定）的胜率阈值（要求胜率不偏离50%太多）
