# 策略工厂入口：可选 TopKDropout / EnhancedIndexing / SoftTopK
# 当前 step08 仅实现 TopKDropout，其它策略先完成配置与校验能力。
strategy_type: TopKDropout

# TopKDropout（当前可执行）
TopKDropout:
  # 买入规则：根据因子得分从高到低排序，优先候选前 N
  buy_top_n: 40
  # 卖出规则：持仓股票若跌出前 M 名则卖出（宽幅缓冲降低换手）
  sell_drop_to: 200
  # 最终目标持仓数
  holding_count: 20
  # 权重模式：
  # - equal_weight：等权持仓（默认）
  # - score_weight：按因子分做权重分配（分高仓位更大）
  weight_mode: equal_weight
  # 每次调仓最多换出数量（用于显式控制换手，阶段三实现）
  max_drop_per_day: 5
  # 因子分数保有率阈值
  # 含义：调仓日因子分数非缺失的股票数占股票池总数的最低比例
  # 低于此值本调仓日不操作（排名都做不了，后续动作没有意义）
  min_score_coverage: 0.90

# EnhancedIndexing（指数增强策略）
# 核心思想：以指数真实成分股权重为基底，用因子得分做有约束的 z-score 倾斜，
# 在跟踪指数的前提下获取超额收益。
#EnhancedIndexing:
  # 单只股票主动权重偏离上限（Active Weight Bound）
  # 含义：某只股票相对其指数基准权重的增减幅度不超过该值（如 ±2%）
  # 示例：基准权重5%的股票，实际权重范围 [3%, 7%]
  #active_weight_bound: 0.02
  # 组合目标持仓数（从指数成分股中选因子得分排名前N的股票）
  # 数量更大：覆盖更广，跟踪更紧密；数量更小：Alpha更集中
  #holding_count: 30
  # 权重模式（当前仅支持 benchmark_tilt）：
  # - benchmark_tilt：以指数真实成分股权重为基底，z-score 倾斜
  #weight_mode: benchmark_tilt
  # 因子分数保有率阈值
  # 含义：调仓日因子分数非缺失的成分股数占成分股总数的最低比例
  # 低于此值本调仓日不操作（排名都做不了，后续动作没有意义）
  #min_score_coverage: 0.90
  # 成分权重保有率阈值
  # 含义：入选的前holding_count只股票中，拥有成分权重数据的最低比例
  # 低于此值本调仓日不操作（权重数据都没有，做动作没有意义）
  #min_weight_coverage: 0.90

# SoftTopK（软性TopK策略）
# 核心思想：先选出Top-N股票，再按分数连续分配权重（而不是简单等权），
SoftTopK:
  # 权重函数：
  # - softmax：对高分更敏感，头部集中度更高
  # - rank_power：按排名幂律衰减，权重更平滑、稳健
  weight_func: softmax
  # 持仓股票数（按因子分从高到低选前N只）
  holding_count: 30
  # softmax 温度参数（仅 weight_func=softmax 时生效）
  # T 越小集中度越高，T 越大越接近等权
  softmax_temperature: 0.7
  # rank_power 衰减参数（仅 weight_func=rank_power 时生效）
  # α 越大头部越集中，α 越小越接近等权
  rank_power_alpha: 1.0
  # 因子分数保有率阈值
  # 含义：调仓日因子分数非缺失的股票数占股票池总数的最低比例
  # 低于此值本调仓日不操作（排名都做不了，后续动作没有意义）
  min_score_coverage: 0.90

# 择时过滤模块（Market Timing）
# 该模块是“叠加层”，不是独立选股策略：
# 在主策略给出目标持仓后，再根据市场状态统一调整总仓位/开仓条件。
MarketTiming:
  # 是否启用择时过滤：
  # - false：不做择时，按主策略满仓执行
  # - true：按 market_indicator 判定风险状态并进行仓位缩放
  enabled: true
  # 市场级择时指标类型（当前实现：EMA_60）
  # EMA_60 语义：当基准收盘价(股票池里各股票的 OHLCV 做平均生成的“合成基准”) < 60日EMA 时，视为风险抬升阶段
  market_indicator: EMA_60
  # 择时触发后的目标暴露比例（0~1）
  # 例如 0.5 表示风险状态下组合总体仓位压到约50%
  # 建议：先用 0.5 做基线，再按回撤容忍度调到 0.3~0.8
  reduce_to: 0.6
  # 个股开仓过滤器（仅对“新开仓”生效，老持仓不受该过滤影响）：
  # - none：不开启个股过滤
  # - ema：仅当个股 close >= 个股EMA(stock_ema_period) 才允许新开仓
  # - rsi：仅当个股 RSI(period) <= rsi_buy_max 才允许新开仓
  stock_open_filter: rsi
  # 个股 EMA 开仓过滤周期（仅 stock_open_filter=ema 时生效）
  # 例如 20 表示用个股 20 日 EMA 判断是否允许新开仓
  stock_ema_period: 60
  # RSI 计算窗口（仅 stock_open_filter=rsi 时生效）
  rsi_period: 14
  # RSI 开仓上限（仅 stock_open_filter=rsi 时生效）
  # 例：70 表示 RSI>70 视为偏热，禁止新开仓；<=70 允许新开仓
  rsi_buy_max: 70.0

# 执行层公共参数
Execution:
  # 回测初始资金（账户起始总资产，单位：元）
  # 例如 1000000 表示以 100 万资金起步；会直接影响每只股票的下单金额
  # 建议与真实资金规模保持同量级，便于评估交易成本和容量约束
  initial_cash: 1000000

  # 交易价格设定：
  # - next_open: 使用信号后的下一交易日开盘价成交
  # - next_close: 使用信号后的下一交易日收盘价成交
  trade_price: next_open

  # 买入手续费率（包含佣金、过户费等），0.0015 表示千分之1.5
  buy_cost: 0.0015
  # 卖出手续费率，0.0025 表示千分之2.5
  # 注意：卖出时还会额外加收印花税（stamp_duty）
  sell_cost: 0.0025
  # 卖出印花税率，0.001 表示千分之1（A股固定税率）
  stamp_duty: 0.001
  # 滑点成本（模拟真实交易中吃单导致的买价更高、卖价更低）
  slippage: 0.0005
  # 资金缓冲比例：预留部分资金防止因手续费导致订单失败
  # 例如 0.02 表示预留2%的资金作为缓冲
  cash_buffer_ratio: 0.02

  # 停牌处理：跳过，不做交易，不延续到后续交易日
  suspend_action: skip

  # 涨停买入处理：跳过，不做交易，不延续到后续交易日
  limit_up_action: skip_buy

  # 跌停卖出处理：跳过当日，后续每日重试卖出，直到卖出成功或到达下一个调仓日
  limit_down_action: delay_sell
