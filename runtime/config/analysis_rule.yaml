# ==============================================================================
# 因子分析口径配置（analysis_rule.yaml）
# 仅放分析参数，不放环境参数、回测交易执行参数
# ==============================================================================

# 【1. 分析样本模式与时间区间】
# run_mode 可选值:
#   - train: 样本内训练模式。用于大模型迭代、因子特征体检、初筛回测。
#   - test:  样本外盲测模式。因子定型后，在这段大模型没见过的数据上验证真实有效性。
run_mode: train

# 样本内 (In-Sample) 时间段
# 方案一：近期滚动窗口 - 用最近 3.5 年数据训练，与当前市场环境更接近
train_start_date: 2020-04-01
train_end_date: 2021-03-31

# 样本外 (Out-of-Sample) 时间段
# 可按需改为最新盲测区间
test_start_date: 2026-01-01
test_end_date: 2026-05-15

# 【2. 样本内训练切分配置】
# mode 可选值:
#   - static_split: 固定 discovery / validation 两段切分
#   - walk_forward: 采用滚动 walk-forward，多窗口重复 discovery / validation
training_workflow:
  mode: static_split
  static_split:
    # discovery_start_date / discovery_end_date:
    # - 含义：海选阶段（discovery）的起止日期。该阶段会跑 step03~step09 产出候选因子。
    # - 设置建议：通常覆盖 train 区间前 60%~80% 的时间；建议不少于 18~24 个月，避免样本太短。
    discovery_start_date: 2020-04-01
    discovery_end_date: 2020-12-31
    # validation_start_date / validation_end_date:
    # - 含义：复试阶段（validation）的起止日期。用 discovery 候选做二次验证与打分。
    # - 设置建议：通常覆盖 train 区间后 20%~40% 的时间；建议不少于 6~12 个月。
    # - 约束：必须满足 discovery_end_date < validation_start_date，且两段都在 train 区间内。
    validation_start_date: 2021-01-01
    validation_end_date: 2021-03-31
  walk_forward:
    # discovery_window_months:
    # - 含义：每个滚动窗口里 discovery 阶段长度（月）。
    # - 设置建议：常用 18~36；市场切换较快用 18~24，追求稳健可用 24~36。
    discovery_window_months: 24
    # validation_window_months:
    # - 含义：每个滚动窗口里 validation 阶段长度（月）。
    # - 设置建议：常用 3~12；建议不大于 discovery_window_months。
    validation_window_months: 6
    # step_months:
    # - 含义：窗口向前滚动的步长（月）。
    # - 设置建议：常用等于 validation_window_months（不重叠）或其一半（允许重叠，提高样本数）。
    step_months: 6
    # max_windows:
    # - 含义：最多生成的滚动窗口数量；0 表示不设上限（直到 train_end_date）。
    # - 设置建议：本地联调用 2~3，正式评估用 4~8（按算力与耗时平衡）。
    max_windows: 3

# 【3. 分析股票池】
# 股票池可选字段（当前 tushare-only 流程）：
#   - include_st: 是否包含 ST 股票
#   - include_new_stock: 是否包含次新股
#   - new_stock_days: 判定“新股”的最小上市天数阈值（include_new_stock=false 时生效）
stock_pool:
  type: index_components
  index_code: SH000300
  # true: 按每个观测日动态更新指数成分（更贴近米框口径）
  dynamic_membership: true
  include_st: false
  include_new_stock: false
  new_stock_days: 60
  # 指数成分查询时，按“目标日 -> 向前开市日”逐日回溯的最大开市日数量。
  # 逻辑：每个回溯日都先查本地 SQLite 缓存；缓存没有再请求 Tushare；命中后立即回写缓存。
  # 作用：随着运行次数增加，缓存会被逐步补全，后续对同类日期请求会越来越少访问 Tushare。
  index_component_search_max_open_days: 2000

# 【3.1 价格复权口径（影响因子与标签）】
# 可选值：
# - none: 不复权（原始价格）
# - pre: 前复权（固定最新日价格，调整历史）
# - post: 后复权（固定最早日价格，调整未来）
# 说明：不同平台默认值可能不同；做对照时务必显式指定
price_adjust: pre
# 前复权统一参考日：
# - auto: 自动取本次任务的 load_end（推荐，结果可复现）
# - YYYY-MM-DD: 显式固定到某一天
price_adjust_reference_date: auto

# 【4. 分析调仓节奏（用于因子分析口径）】
# rebalance 可选值: daily / weekly / monthly
rebalance: weekly
# rebalance_interval: 调仓间隔（周期数量），1 表示每个周期都调仓，2 表示隔一个周期调仓
rebalance_interval: 1
# rebalance_anchor: 周/月频调仓锚点
# - weekly: first_trading_day_of_week / last_trading_day_of_week
# - monthly: first_trading_day_of_month / last_trading_day_of_month
rebalance_anchor: first_trading_day_of_week
# 每个观测日最小有效样本占比（n_valid / label_available），低于阈值的观测日不参与 IC/IR 聚合。
min_valid_ratio_per_observation: 0.9

# 【5. 收益标签配置（LLM 挖掘阶段与因子研究阶段共用）】
# 说明：
# - 本地 step03-step05 与 step07 统一使用该 label 口径。
# - 收益标签由上面的 rebalance / rebalance_interval / rebalance_anchor 自动决定。
# - 当前实现按相邻两次调仓观测日之间的持有期收益生成标签，便于本地评估口径一致性校验。
label:
  # 标签列名与分析目标名称。
  name: rebalance_period_return
  # 当前仅支持 period_return。
  return_type: period_return
  # 收益标签使用的价格列；当前 period_return 会按该价格列计算相邻调仓观测日之间的收益。
  price_field: close

# 【6. 预处理设置（按日期截面执行）】
# 说明：
# - 这里只处理“候选因子值”，不改原始行情，也不改基础特征。
# - 处理顺序固定为：离群值处理 -> 中性化处理。
# - 当前配置仅面向本地 tushare-only 流程，不单独暴露“标准化”选项。
preprocess:
  # 离群值处理
  # 可选值：
  # - none: 不处理
  # - mad: MAD
  # - quantile: 分位法
  # - sigma: 3sigma
  outlier_method: none
  outlier_options:
    # n: MAD / 3sigma 使用的倍数阈值。米框界面里常见默认输入就是 3。
    n: 3.0
    # lower_quantile / upper_quantile: 分位法使用的头尾分位点。
    # 例如 0.01 / 0.99 表示把当天最极端的头尾各 1% 压回边界。
    lower_quantile: 0.01
    upper_quantile: 0.99
  # 中性化处理
  # 可选值：
  # - none: 不处理
  # - industry: 行业中性化
  # - market_cap: 市值中性化
  # - industry_market_cap: 行业市值中性化
  neutralization: none
  neutralization_options:
    # industry_field: 行业字段名，默认使用原始数据中的 industry 列。
    industry_field: industry
    # market_cap_field: 市值字段名，默认使用原始数据中的 market_cap 列。
    market_cap_field: market_cap
