# 原始字段 (Fields): 相当于"最基础的食材"，也就是交易所直接产生的原始数据
# 对于 Tushare 日频链路，VWAP 基于 daily.amount（千元）与 daily.vol（手）按 amount * 10 / volume 派生
raw_fields:
  # ── 技术面：趋势 / 反转 / 波动 / 量价 / 日内细节 ───────────
  - name: open
    description: 开盘价，用于刻画隔夜跳空与日内强弱
  - name: close
    description: 收盘价，用于构建收益率、趋势、波动率等核心价格特征
  - name: high
    description: 最高价，用于刻画上影线、区间突破、振幅上沿
  - name: low
    description: 最低价，用于刻画下影线、回撤、振幅下沿
  - name: volume
    description: 成交量，用于刻画交易活跃度、放量缩量、价量共振
  - name: amount
    description: 成交额，来自 Tushare daily.amount，可用于衡量真实资金参与强度
  - name: vwap
    description: 成交量加权平均价，在 Tushare 日频下由 amount 与 volume 派生，可用于近似刻画全天成交重心
  # ── 技术面：筹码 ──────────────────────────────────────────
  - name: turnover
    description: 换手率，来自 Tushare daily_basic.turnover_rate，可用于衡量筹码交换速度
  # ── 基本面：估值 ──────────────────────────────────────────
  - name: market_cap
    description: 总市值，来自 Tushare daily_basic.total_mv，可用于容量与风格约束
  - name: pe_ttm
    description: 滚动市盈率，来自 Tushare daily_basic.pe_ttm，可用于价值风格刻画
  - name: pb
    description: 市净率，来自 Tushare daily_basic.pb，可用于估值与资产定价约束
  - name: ps_ttm
    description: 滚动市销率，来自 Tushare daily_basic.ps_ttm，可用于成长股高估值识别
  - name: dv_ttm
    description: 滚动股息率，来自 Tushare daily_basic.dv_ttm，可用于红利风格刻画
  # ── 基本面：盈利质量 ──────────────────────────────────────
  - name: eps
    description: 每股收益，来自 Tushare fina_indicator.eps，按 ann_date 做 as-of 对齐
  - name: roe
    description: 净资产收益率，来自 Tushare fina_indicator.roe，按 ann_date 做 as-of 对齐
  - name: q_roe
    description: 单季 ROE，来自 Tushare fina_indicator.q_roe，按 ann_date 做 as-of 对齐
  - name: grossprofit_margin
    description: 毛利率，来自 Tushare fina_indicator.grossprofit_margin，按 ann_date 做 as-of 对齐
  - name: netprofit_margin
    description: 净利率，来自 Tushare fina_indicator.netprofit_margin，按 ann_date 做 as-of 对齐
  - name: q_ocf_to_sales
    description: 单季经营现金流/销售收入，衡量主营业务现金创造能力；按 ann_date 做 as-of 对齐
  - name: dt_netprofit_yoy
    description: 扣非净利润同比增速，衡量真实可持续盈利成长；按 ann_date 做 as-of 对齐
  - name: netprofit_yoy
    description: 净利润同比增速，来自 Tushare fina_indicator.netprofit_yoy，按 ann_date 做 as-of 对齐
  - name: or_yoy
    description: 营业收入同比增速，来自 Tushare fina_indicator.or_yoy，按 ann_date 做 as-of 对齐
  - name: op_yoy
    description: 营业利润同比增速，衡量经营层面盈利成长；按 ann_date 做 as-of 对齐
  - name: equity_yoy
    description: 净资产同比增速，衡量股东权益扩张速度；按 ann_date 做 as-of 对齐
  # ── 基本面：投资因子 ──────────────────────────────────────
  - name: assets_yoy
    description: 总资产同比增速，衡量资产扩张速度（资产增长异象的输入）；按 ann_date 做 as-of 对齐
  # ── 基本面：财务健康 ──────────────────────────────────────
  - name: debt_to_assets
    description: 资产负债率（百分数），衡量整体财务杠杆；按 ann_date 做 as-of 对齐
  - name: current_ratio
    description: 流动比率，衡量短期偿债能力；按 ann_date 做 as-of 对齐
  - name: ocf_to_debt
    description: 经营现金流/总负债，衡量利息和债务的现金覆盖能力；按 ann_date 做 as-of 对齐
  # ── 基本面：现金流 ──────────────────────────────────────
  - name: fcff
    description: 企业自由现金流（绝对金额，元），按 ann_date 做 as-of 对齐
  # ── 行业分类 ──────────────────────────────────────────────
  - name: industry
    description: 行业分类，来自 Tushare stock_basic.industry，可用于行业分组或中性化处理
  # ── 基准指数行情（Alpha191） ─────────────────────────────
  - name: benchmark_open
    description: 基准指数开盘价，来自 Tushare index_daily，用于 Alpha75/149/181/182
    hidden: true
  - name: benchmark_high
    description: 基准指数最高价，来自 Tushare index_daily
    hidden: true
  - name: benchmark_low
    description: 基准指数最低价，来自 Tushare index_daily
    hidden: true
  - name: benchmark_close
    description: 基准指数收盘价，来自 Tushare index_daily，用于 Alpha75/149/181/182
    hidden: true

# 基础特征 (Features): 相当于"切好、腌制好的半成品"，是基于原始数据经过简单计算得出的指标
base_features:
  # ── 技术面：趋势 ──────────────────────────────────────────
  - name: ret_1d
    description: 1日收益率，衡量最短周期价格变化
    expr: close.pct_change(1)
  - name: ret_5d
    description: 5日收益率，衡量一周级别短期动量
    expr: close.pct_change(5)
  - name: ret_10d
    description: 10日收益率，衡量两周级别短期趋势
    expr: close.pct_change(10)
  - name: ret_20d
    description: 20日收益率，衡量一月级别中短期动量
    expr: close.pct_change(20)
  - name: ret_60d
    description: 60日收益率，衡量季度级别中期趋势
    expr: close.pct_change(60)
  - name: rebound_20d
    description: 20日反弹幅度，衡量是否脱离近期低点
    expr: close / close.rolling(20).min().shift(1) - 1
  - name: breakout_20d
    description: 20日向上突破幅度，衡量是否接近或突破近期新高
    expr: close / close.rolling(20).max().shift(1) - 1
  - name: vwap_ret_5d
    description: 成交均价5日变化率，衡量一周内全天成交重心的短期趋势
    expr: vwap.pct_change(5)
  - name: vwap_ret_20d
    description: 成交均价20日变化率，衡量一月内全天成交重心的中短期趋势
    expr: vwap.pct_change(20)

  # ── 技术面：反转 ──────────────────────────────────────────
  - name: price_pos_10d
    description: 10日价格位置，衡量当前价在近10日区间中的相对高度
    expr: (close - close.rolling(10).min()) / (close.rolling(10).max() - close.rolling(10).min())
  - name: price_pos_20d
    description: 20日价格位置，衡量当前价在近20日区间中的相对高度
    expr: (close - close.rolling(20).min()) / (close.rolling(20).max() - close.rolling(20).min())
  - name: price_pos_60d
    description: 60日价格位置，衡量当前价在近60日区间中的相对高度
    expr: (close - close.rolling(60).min()) / (close.rolling(60).max() - close.rolling(60).min())
  - name: max_drawdown_10d
    description: 10日最大回撤，衡量短期回撤压力
    expr: close / close.rolling(10).max() - 1
  - name: max_drawdown_20d
    description: 20日最大回撤，衡量月度回撤压力
    expr: close / close.rolling(20).max() - 1
  - name: max_drawdown_60d
    description: 60日最大回撤，衡量中期回撤压力
    expr: close / close.rolling(60).max() - 1

  # ── 技术面：波动 ──────────────────────────────────────────
  - name: high_low_range
    description: 日内振幅，衡量当天波动区间大小
    expr: high / low - 1
  - name: realized_vol_5d
    description: 5日实现波动率，衡量短期收益离散程度
    expr: close.pct_change().rolling(5).std()
  - name: realized_vol_20d
    description: 20日实现波动率，衡量月度收益离散程度
    expr: close.pct_change().rolling(20).std()
  - name: realized_vol_60d
    description: 60日实现波动率，衡量中期收益离散程度
    expr: close.pct_change().rolling(60).std()

  # ── 技术面：量价 ──────────────────────────────────────────
  - name: volume_mean_5d
    description: 5日平均成交量，衡量短期平均活跃度
    expr: volume.rolling(5).mean()
  - name: volume_mean_20d
    description: 20日平均成交量，衡量月度平均活跃度
    expr: volume.rolling(20).mean()
  - name: volume_mean_60d
    description: 60日平均成交量，衡量中期平均活跃度
    expr: volume.rolling(60).mean()
  - name: volume_ratio_5d
    description: 当日量比5日均量，衡量是否突然放量
    expr: volume / volume_mean_5d
  - name: volume_ratio_20d
    description: 当日量比20日均量，衡量相对月度放量水平
    expr: volume / volume_mean_20d
  - name: volume_vol_20d
    description: 成交量波动率，衡量量能稳定性
    expr: volume.pct_change().rolling(20).std()
  - name: amount_mean_5d
    description: 5日平均成交额，衡量短期资金参与的平均强度
    expr: amount.rolling(5).mean()
  - name: amount_mean_20d
    description: 20日平均成交额，衡量月度资金参与的平均强度
    expr: amount.rolling(20).mean()
  - name: amount_ratio_20d
    description: 成交额相对20日均值之比，衡量是否出现显著放量成交额
    expr: amount / amount_mean_20d
  - name: amount_vol_20d
    description: 成交额波动率，衡量资金参与是否稳定
    expr: amount.pct_change().rolling(20).std()

  # ── 技术面：日内细节 ──────────────────────────────────────
  - name: gap_open_ret
    description: 跳空收益率，衡量隔夜情绪与开盘缺口
    expr: open / close.shift(1) - 1
  - name: intraday_ret
    description: 日内收益率，衡量开盘到收盘的当日强弱
    expr: close / open - 1
  - name: close_to_high
    description: 收盘贴近最高价程度，越接近0代表收在高位
    expr: close / high - 1
  - name: close_to_low
    description: 收盘贴近最低价程度，越接近0代表收在低位
    expr: close / low - 1
  - name: close_to_vwap
    description: 收盘相对成交均价偏离，衡量尾盘相对全天成交重心的强弱
    expr: close / vwap - 1
  - name: high_to_vwap
    description: 最高价相对成交均价偏离，衡量盘中上冲是否显著高于全天成交重心
    expr: high / vwap - 1
  - name: low_to_vwap
    description: 最低价相对成交均价偏离，衡量盘中下探是否显著低于全天成交重心
    expr: low / vwap - 1

  # ── 技术面：筹码 ──────────────────────────────────────────
  - name: turnover_mean_5d
    description: 5日平均换手率，衡量短期筹码交换强度
    expr: turnover.rolling(5).mean()
  - name: turnover_mean_20d
    description: 20日平均换手率，衡量月度筹码交换强度
    expr: turnover.rolling(20).mean()
  - name: turnover_ratio_20d
    description: 当日换手率相对20日均值之比，衡量换手是否异常活跃
    expr: turnover / turnover_mean_20d
  - name: turnover_vol_20d
    description: 换手率波动率，衡量交易热度是否忽高忽低
    expr: turnover.pct_change().rolling(20).std()
  - name: chip_concentration_90d
    description: 90日筹码集中度，衡量季度级别筹码锁定程度，值越小代表筹码越集中、抛压越小
    expr: chip.concentration_90d
  - name: chip_concentration_210d
    description: 210日筹码集中度，衡量年度级别筹码锁定程度，值越小代表筹码越集中、抛压越小
    expr: chip.concentration_210d
  - name: profit_ratio_90d
    description: 90日获利盘比例，衡量季度级别获利盘压力，>80%抛压大，<20%可能见底
    expr: chip.profit_ratio_90d
  - name: profit_ratio_210d
    description: 210日获利盘比例，衡量年度级别获利盘压力，>80%抛压大，<20%可能见底
    expr: chip.profit_ratio_210d
  - name: avg_cost_distance_90d
    description: 90日平均成本偏离度，当前价相对90日平均成本的偏离，偏离度越小越接近市场平均成本
    expr: chip.avg_cost_distance_90d
  - name: avg_cost_distance_210d
    description: 210日平均成本偏离度，当前价相对210日平均成本的偏离，偏离度越小越接近市场平均成本
    expr: chip.avg_cost_distance_210d
  - name: peak_distance_90d
    description: 90日筹码峰距离，当前价相对90日筹码峰的距离，距离越近支撑/压力越强
    expr: chip.peak_distance_90d
  - name: peak_distance_210d
    description: 210日筹码峰距离，当前价相对210日筹码峰的距离，距离越近支撑/压力越强
    expr: chip.peak_distance_210d

  # ── 基本面：估值 ──────────────────────────────────────────
  - name: pe_ttm
    description: 滚动市盈率，值越低通常代表估值越便宜
    expr: pe_ttm
  - name: pb
    description: 市净率，值越低通常代表资产相对价格更便宜
    expr: pb
  - name: ps_ttm
    description: 滚动市销率，适合刻画高成长高估值与低估值销售倍率差异
    expr: ps_ttm
  - name: dv_ttm
    description: 滚动股息率，值越高通常代表红利属性越强
    expr: dv_ttm
  - name: earnings_yield
    description: 盈利收益率，等于1/pe_ttm，适合把低PE映射成"高收益率"刻画
    expr: 1 / pe_ttm
  - name: sales_yield
    description: 销售收益率，等于1/ps_ttm，适合把低PS映射成"高销售支撑"刻画
    expr: 1 / ps_ttm
  - name: market_cap_change_20d
    description: 20日总市值变化率，衡量容量扩张或收缩
    expr: market_cap.pct_change(20)
  - name: market_cap_stability_20d
    description: 20日市值稳定度，衡量容量波动是否平稳
    expr: market_cap.pct_change().rolling(20).std()

  # ── 基本面：盈利质量 ──────────────────────────────────────
  - name: eps
    description: 每股收益，适合刻画盈利能力与估值约束
    expr: eps
  - name: roe
    description: 净资产收益率，适合刻画质量与盈利效率
    expr: roe
  - name: netprofit_yoy
    description: 净利润同比增速，适合刻画业绩成长
    expr: netprofit_yoy
  - name: or_yoy
    description: 营业收入同比增速，适合刻画收入成长
    expr: or_yoy
  - name: quality_value
    description: 质量价值结合，等于roe/pb，ROE高且PB低时更强
    expr: roe / pb
  - name: profit_revenue_gap
    description: 利润增速相对收入增速的优势，等于netprofit_yoy-or_yoy，衡量利润弹性是否强于收入扩张
    expr: netprofit_yoy - or_yoy
  - name: profit_quality
    description: 单季现金流质量，等于 q_ocf_to_sales / 100；越高代表每元营收带来更多经营现金流
    expr: q_ocf_to_sales / 100
  - name: q_roe_acceleration
    description: 单季 ROE 相对年化 ROE 的偏离，衡量盈利能力是否在改善（q_roe - roe/4，正值代表加速）
    expr: q_roe - roe / 4
  - name: gross_margin
    description: 毛利率，等于 grossprofit_margin；越高代表产品议价能力越强
    expr: grossprofit_margin
  - name: net_margin
    description: 净利率，等于 netprofit_margin；越高代表盈利效率越强
    expr: netprofit_margin
  - name: real_growth
    description: 真实可持续盈利成长，等于 dt_netprofit_yoy（扣非净利润同比）；过滤一次性损益后的成长信号
    expr: dt_netprofit_yoy
  - name: op_growth
    description: 营业利润同比增速，等于 op_yoy；经营层面成长信号，比净利润更纯粹
    expr: op_yoy
  - name: equity_growth
    description: 净资产同比增速，等于 equity_yoy；股东权益扩张速度
    expr: equity_yoy

  # ── 基本面：投资因子 ──────────────────────────────────────
  - name: asset_growth_inverse
    description: 资产增长率反向因子，等于 -assets_yoy；资产扩张过快往往预示未来收益走低（资产增长异象，higher_better）
    expr: 0 - assets_yoy

  # ── 基本面：财务健康 ──────────────────────────────────────
  - name: financial_health
    description: 财务健康综合指标，等于 1 / (1 + debt_to_assets / 100)；负债率越低值越大代表财务越健康
    expr: 1.0 / (1.0 + debt_to_assets / 100)
  - name: liquidity_strength
    description: 短期流动性强度，等于 current_ratio；> 2 通常视为健康
    expr: current_ratio
  - name: debt_service_ability
    description: 债务偿付能力，等于 ocf_to_debt；衡量经营现金流相对总负债的比例
    expr: ocf_to_debt

  # ── 基本面：现金流 ──────────────────────────────────────
  - name: fcf_yield
    description: 自由现金流收益率，等于 fcff / market_cap；类似 earnings_yield 但用现金流口径。注意：fcff 对金融行业（银行/保险/证券）不可用，会导致覆盖率下降，当股票池包含金融股时慎用，或配合行业中性化处理
    expr: fcff / market_cap

  # ── Alpha191 原始字段直引（供 alpha191 公式直接引用） ──────
  - name: open
    description: 开盘价直引（alpha191 公式直接引用 OPEN）
    expr: open
    hidden: true
  - name: close
    description: 收盘价直引（alpha191 公式直接引用 CLOSE）
    expr: close
    hidden: true
  - name: high
    description: 最高价直引（alpha191 公式直接引用 HIGH）
    expr: high
    hidden: true
  - name: low
    description: 最低价直引（alpha191 公式直接引用 LOW）
    expr: low
    hidden: true
  - name: volume
    description: 成交量直引（alpha191 公式直接引用 VOLUME/VOL）
    expr: volume
    hidden: true
  - name: amount
    description: 成交额直引（alpha191 公式直接引用 AMOUNT）
    expr: amount
    hidden: true
  - name: vwap
    description: VWAP 直引（alpha191 公式直接引用 VWAP）
    expr: vwap
    hidden: true
  - name: benchmark_open
    description: 基准指数开盘价直引（alpha191 公式直接引用 BANCHMARKINDEXOPEN）
    expr: benchmark_open
    hidden: true
  - name: benchmark_high
    description: 基准指数最高价直引（alpha191 公式直接引用 BANCHMARKINDEXHIGH）
    expr: benchmark_high
    hidden: true
  - name: benchmark_low
    description: 基准指数最低价直引（alpha191 公式直接引用 BANCHMARKINDEXLOW）
    expr: benchmark_low
    hidden: true
  - name: benchmark_close
    description: 基准指数收盘价直引（alpha191 公式直接引用 BANCHMARKINDEXCLOSE）
    expr: benchmark_close
    hidden: true

  # ── Alpha191 辅助特征 ──────────────────────────────────
  - name: dtm
    description: Alpha69 辅助变量，等于 MAX(OPEN-DELAY(OPEN,1), 0)，当日开盘相对昨日开盘的上行幅度（取正）
    expr: (open - open.shift(1)).clip(lower=0)
    hidden: true
  - name: dbm
    description: Alpha69 辅助变量，等于 MAX(DELAY(OPEN,1)-OPEN, 0)，昨日开盘相对今日开盘的下行幅度（取正）
    expr: (open.shift(1) - open).clip(lower=0)
    hidden: true
  - name: hd
    description: Alpha172/186 辅助变量，正向趋向动量，当日高点比昨日高点的上扬幅度（取正），且大于低价下挫幅度时才有值，否则为 0
    expr: ((high - high.shift(1)).clip(lower=0)).where((high - high.shift(1)) > (low.shift(1) - low).clip(lower=0), 0)
    hidden: true
  - name: ld
    description: Alpha172/186 辅助变量，负向趋向动量，昨日低点比今日低点的下挫幅度（取正），且大于高点上扬幅度时才有值，否则为 0
    expr: ((low.shift(1) - low).clip(lower=0)).where((low.shift(1) - low) > (high - high.shift(1)).clip(lower=0), 0)
    hidden: true
  - name: tr
    description: Alpha172/186 辅助变量，真实波幅 TR = MAX(HIGH-LOW, ABS(HIGH-DELAY(CLOSE,1)), ABS(DELAY(CLOSE,1)-LOW))
    expr: np.maximum(np.maximum(high - low, (high - close.shift(1)).abs()), (close.shift(1) - low).abs())
    hidden: true

# 允许使用的算子 (Operators): 相当于"烹饪手法"，用来限制大模型，它只能用这些方法去组合产生新的因子
allowed_operators:
  - name: add
    signature: left + right 或 add(left, right)
    type: 算术
    description: 加法，用于构建线性组合或加总信号
  - name: sub
    signature: left - right 或 sub(left, right)
    type: 算术
    description: 减法，用于提取强弱差、斜率差、增量信息
  - name: mul
    signature: left * right 或 mul(left, right)
    type: 算术
    description: 乘法，用于构建共振、交互和条件放大效应
  - name: div
    signature: left / right 或 div(left, right)
    type: 算术
    description: 除法，用于做比值、归因或风险惩罚；分母为 0 会转为缺失值
  - name: abs
    signature: abs(series)
    type: 逐元素
    description: 绝对值，用于提取偏离强度而忽略方向
  - name: log
    signature: log(series)
    type: 逐元素
    description: 对数变换，用于压缩长尾分布；0 会转为缺失值
  - name: sqrt
    signature: sqrt(series)
    type: 逐元素
    description: 平方根变换，用于弱化极端值影响；负值按 0 处理
  - name: sign
    signature: sign(series)
    type: 逐元素
    description: 符号函数，用于只保留方向不保留幅度，输出 -1、0、1
  - name: rolling_mean
    signature: rolling_mean(series, window)
    type: 时序
    description: 按单只股票的时间序列计算滚动均值，min_periods=window，用于平滑噪声
  - name: rolling_std
    signature: rolling_std(series, window)
    type: 时序
    description: 按单只股票的时间序列计算滚动标准差，min_periods=window，用于刻画波动
  - name: rolling_sum
    signature: rolling_sum(series, window)
    type: 时序
    description: 按单只股票的时间序列计算滚动求和，min_periods=window，用于累计近期冲击
  - name: rolling_max
    signature: rolling_max(series, window)
    type: 时序
    description: 按单只股票的时间序列计算滚动最大值，用于刻画突破和阶段高点
  - name: rolling_min
    signature: rolling_min(series, window)
    type: 时序
    description: 按单只股票的时间序列计算滚动最小值，用于刻画支撑和阶段低点
  - name: delay
    signature: delay(series, periods)
    type: 时序
    description: 按单只股票的时间序列滞后 periods 期，用于引用过去值
  - name: delta
    signature: delta(series, periods)
    type: 时序
    description: 当前值减去 periods 期前的值，即 series - delay(series, periods)
  - name: pct_change
    signature: pct_change(series, periods)
    type: 时序
    description: 按单只股票的时间序列计算 periods 期变化率
  - name: ema
    signature: ema(series, span)
    type: 时序
    description: 按单只股票的时间序列计算指数移动平均，强调近期信息
  - name: ts_rank
    signature: ts_rank(series, window)
    type: 时序
    description: 按单只股票的时间序列，计算当前值在过去 window 期窗口中的百分位排名
  - name: ts_zscore
    signature: ts_zscore(series, window)
    type: 时序
    description: 按单只股票的时间序列，计算当前值相对过去 window 期均值和标准差的 z-score
  - name: rolling_corr
    signature: rolling_corr(left, right, window)
    type: 时序
    description: 按单只股票的时间序列，计算两个序列过去 window 期的滚动相关性
  - name: rank
    signature: rank(series)
    type: 横截面
    description: 每天在所有股票之间做百分位排名，用于比较同一天股票间相对强弱
  - name: zscore
    signature: zscore(series)
    type: 横截面
    description: 每天在所有股票之间做标准化，输出相对当日横截面的偏离程度
  - name: minmax
    signature: minmax(series)
    type: 横截面
    description: 每天在所有股票之间做 0-1 归一化
  - name: clip
    signature: clip(series, lower, upper)
    type: 逐元素
    description: 把数值截断到 [lower, upper] 区间
  - name: winsorize
    signature: winsorize(series, lower_quantile, upper_quantile)
    type: 横截面
    description: 每天按横截面分位数缩尾，例如 winsorize(x, 0.01, 0.99)
  # ── Alpha191 扩展算子 ──────────────────────────────────────
  - name: sma
    signature: sma(series, n, m)
    type: 时序
    description: 递推 SMA，Y_t = (m * x_t + (n - m) * Y_{t-1}) / n，等价于 ewm(alpha=m/n, adjust=False)；alpha191 大量使用
  - name: decay_linear
    signature: decay_linear(series, n)
    type: 时序
    description: 线性衰减加权移动平均，权重 w_i = i+1（最新值权重最大），min_periods=n
  - name: wma
    signature: wma(series, n)
    type: 时序
    description: 加权移动平均，权重与 decay_linear 相同
  - name: regbeta
    signature: regbeta(y, x, n)
    type: 时序
    description: 滚动 OLS 回归斜率，y 对 x 回归，窗口 n 期；分母为 0 时返回缺失值
  - name: regbeta_seq
    signature: regbeta_seq(y, n)
    type: 时序
    description: 滚动回归 y 对时间趋势 [1, 2, ..., n] 的斜率，用于 REGBETA(y, SEQUENCE(n)) 场景
  - name: count
    signature: count(cond, n)
    type: 时序
    description: 条件计数，统计过去 n 期中 cond 为真的次数
  - name: sumif
    signature: sumif(x, n, cond)
    type: 时序
    description: 条件求和，过去 n 期中 cond 为真时的 x 求和
  - name: sumac
    signature: sumac(series)
    type: 时序
    description: 累计求和，按单只股票的时间序列做 cumsum
  - name: prod
    signature: prod(series, n)
    type: 时序
    description: 滚动累乘，计算过去 n 期的乘积
  - name: lowday
    signature: lowday(series, n)
    type: 时序
    description: 极值位置，最小值距今的天数（0 = 今天）
  - name: highday
    signature: highday(series, n)
    type: 时序
    description: 极值位置，最大值距今的天数（0 = 今天）
  - name: covariance
    signature: covariance(x, y, n)
    type: 时序
    description: 滚动协方差（ddof=0），按单只股票的时间序列计算两个序列过去 n 期的协方差
  - name: maximum
    signature: maximum(left, right)
    type: 逐元素
    description: 逐元素最大值，兼容 Series 与标量
  - name: minimum
    signature: minimum(left, right)
    type: 逐元素
    description: 逐元素最小值，兼容 Series 与标量
  - name: filter_cond
    signature: filter_cond(x, cond)
    type: 逐元素
    description: 条件过滤，cond 为真时保留 x，否则置 NaN
  - name: where
    signature: where(cond, x, y)
    type: 逐元素
    description: 三元条件表达式，cond 为真返回 x，否则返回 y；保留 Series 类型，用于替代 np.where

# 因子生成约束 (Generation Constraints): 用来收紧 LLM 的搜索空间，提升生产稳定性与可解释性
generation_constraints:
  max_call_depth:
    value: 3
    description: 算子嵌套最多 3 层，避免公式过度套娃
  max_feature_count:
    value: 4
    description: 单个公式最多使用 4 个基础特征，保证逻辑清晰
  max_operator_count:
    value: 4
    description: 单个公式最多调用 4 次算子，避免无意义复杂化
  max_same_feature_reuse:
    value: 2
    description: 同一特征最多重复使用 2 次，避免围绕单一信号反复加工
  max_same_operator_reuse:
    value: 2
    description: 同一算子最多重复使用 2 次，避免同类变换层层叠加
  allowed_windows:
    value: [1, 5, 10, 20, 60, 120]
    description: 仅允许固定窗口，避免 LLM 随意发明奇怪周期
  forbidden_operator_chains:
    value:
      - [rank, zscore]
      - [zscore, rank]
      - [rank, minmax]
      - [minmax, rank]
      - [ts_rank, rank]
      - [rank, ts_rank]
      - [rolling_mean, ema]
      - [ema, rolling_mean]
      - [ema, ema]
      - [rolling_mean, rolling_mean]
    description: 禁止的算子链组合，违反即被拒绝；避免重复标准化、重复排序、重复平滑

# 特征族总开关：关闭后会从基础特征池中移除 chip.* 特征，并自动禁用 chip_distribution 分析师
enable_chip_features: false
