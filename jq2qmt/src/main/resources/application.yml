server:
  port: 8080
  servlet:
    context-path: /

spring:
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: ""
      database: 1
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

jq2qmt:
  stream:
    prefix: "factor_factory:"
    max-length: 1000
    consumer-group: "qmt_workers"
    consumer-name: "worker-1"
  signal:
    expire-seconds: 300
    max-slippage-pct: 0.02
    max-position-pct: 0.15
  auth:
    enabled: true
    api-key: "change-me-in-production"
  cors:
    allowed-origins: "*"

logging:
  level:
    com.factorfactory.jq2qmt: INFO
    org.springframework.data.redis: WARN
